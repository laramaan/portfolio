<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              white: "#ffffff",
              green: "#334d36",
              yellow: "#faae19",
              grey: "#f6f6f6",
            },
            fontFamily: {
              headline: ["Plus Jakarta Sans", "sans-serif"],
              body: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-white text-green min-h-screen flex items-center justify-center font-body p-8">
    <div class="text-center max-w-xl">
      <h1 class="font-headline font-extrabold text-[150px] leading-none text-yellow mb-4 drop-shadow-sm">404</h1>
      <h2 class="font-headline font-bold text-4xl text-green mb-6">Page Not Found</h2>
      <p class="text-lg text-green/70 mb-12">
        Oops! The page you are looking for doesn't exist, has been removed, or is temporarily unavailable.
      </p>
      
      <a href="/index.html" class="inline-flex items-center bg-yellow p-[2px] rounded-full shadow-sm transition-all duration-300 w-fit group border-none mx-auto cursor-pointer">
        <span class="bg-green text-white px-8 py-3.5 rounded-full font-bold font-headline text-sm tracking-wide mr-2 transition-colors">
          Back to Homepage
        </span>
        <div class="bg-white text-green w-10 h-10 rounded-full flex items-center justify-center shadow-sm mr-1 group-hover:-translate-x-1 transition-transform">
          <svg fill="currentColor" viewBox="0 0 24 24" class="w-5 h-5 ml-0.5 transform rotate-180">
             <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8-8-8z"/>
          </svg>
        </div>
      </a>
    </div>
  </body>
</html>
